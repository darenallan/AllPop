<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>404 — Sanhia</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;700;900&family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;700&display=swap" rel="stylesheet"/>
 
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/pages/404.css" />
  <link rel="stylesheet" href="assets/css/aurum-light.css" />
  </head>
<body>

<div id="cur-ring"></div>
<div id="cur-dot"></div>
<div id="noise"></div>
<div id="header-placeholder"></div>

<!-- STAGE -->
<div class="stage">

  <!-- LEFT -->
  <div class="left">
    <div class="num-wrap">
      <span class="num-ghost">404</span>
      <span class="num-real">404</span>
    </div>

    <h1 class="headline">
      Vous vous êtes<br><em>égaré</em> dans nos rayons
    </h1>

    <p class="subtext">
      La page que vous recherchez n'existe plus ou a été déplacée.<br>
      Nos collections vous attendent.
    </p>

    <div class="cta-row">
      <a href="index.html" class="btn-aurum-primary">
        <span>Retour à la collection</span>
      </a>
      <a href="catalogue.html" class="btn-aurum-dark">
        Voir le catalogue
      </a>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="grid-lines"></div>

    <div class="ornament">
      <div class="orn-ring"></div>
      <div class="orn-ring"></div>
      <div class="orn-ring"></div>
      <div class="orn-center">
        <span class="orn-404">404</span>
        <span class="orn-label">Page introuvable</span>
      </div>
    </div>

    <!-- Particules -->
    <div class="particle" style="left:20%;bottom:15%;--d:7s;--delay:0s;--dx:30px"></div>
    <div class="particle" style="left:35%;bottom:20%;--d:9s;--delay:1.5s;--dx:-20px"></div>
    <div class="particle" style="left:55%;bottom:12%;--d:6s;--delay:.8s;--dx:15px"></div>
    <div class="particle" style="left:70%;bottom:25%;--d:8s;--delay:2s;--dx:-25px"></div>
    <div class="particle" style="left:80%;bottom:18%;--d:7.5s;--delay:.3s;--dx:10px"></div>
    <div class="particle" style="left:45%;bottom:30%;--d:10s;--delay:3s;--dx:-15px"></div>
    <div class="particle" style="left:25%;bottom:40%;--d:8s;--delay:1s;--dx:20px"></div>
    <div class="particle" style="left:60%;bottom:45%;--d:6.5s;--delay:2.5s;--dx:-30px"></div>
  </div>
</div>

<!-- BOTTOM LINKS BAR -->
<nav class="links-bar">
  <span class="links-bar-label">Aller vers</span>
  <a href="index.html" class="link-item">Accueil</a>
  <a href="catalogue.html" class="link-item">Catalogue</a>
  <a href="boutique-list.html" class="link-item">Nos Boutiques</a>
  <a href="login.html" class="link-item">Mon compte</a>
</nav>

<script src="assets/js/global.js" defer></script>
<script src="assets/js/pages/404.js" defer></script>

</body>
</html>
