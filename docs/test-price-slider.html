<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Price Slider</title>
    <script src="assets/js/components/header.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: #f5f5f5;
        }
        
        .test-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            margin: 20px auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        h2 {
            margin-top: 0;
            color: #333;
        }
        
        .price-inputs {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .price-input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .price-input:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.1);
        }
        
        .price-slider {
            margin-top: 15px;
            background: #ffffff;
            position: relative;
            width: 100%;
            height: 40px;
            display: flex;
            align-items: center;
        }
        
        .price-slider::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
            pointer-events: none;
        }
        
        .price-slider::after {
            content: '';
            position: absolute;
            height: 6px;
            background: #d4af37;
            border-radius: 3px;
            top: 50%;
            transform: translateY(-50%);
            left: var(--range-progress-min, 0%);
            right: calc(100% - var(--range-progress-max, 100%));
            z-index: 2;
            pointer-events: none;
        }
        
        .price-slider input[type="range"] {
            position: relative;
            width: 100%;
            height: 40px;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            outline: none;
            pointer-events: auto;
            z-index: 3;
        }
        
        #price-range-min {
            z-index: 5;
        }
        
        #price-range-max {
            z-index: 6;
        }
        
        .price-slider input[type="range"]::-webkit-slider-runnable-track {
            background: transparent;
            height: 6px;
            border-radius: 3px;
        }
        
        .price-slider input[type="range"]::-moz-range-track {
            background: transparent;
            border: none;
        }
        
        .price-slider input[type="range"]::-moz-range-progress {
            background: transparent;
        }
        
        .price-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #d4af37;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            pointer-events: auto;
            border: 2px solid #ffffff;
        }
        
        .price-slider input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #d4af37;
            cursor: pointer;
            border: 2px solid #ffffff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            pointer-events: auto;
        }
        
        .debug-info {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            color: #666;
        }
    </style>
    <link rel="stylesheet" href="assets/css/aurum-light.css" />
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="test-container">
        <h2>Test Price Slider</h2>
        
        <div class="price-inputs">
            <input 
                type="number" 
                class="price-input" 
                id="price-min" 
                placeholder="Min"
                min="0"
                value="0"
            >
            <span style="color: #D4AF37; font-weight: 700;">—</span>
            <input 
                type="number" 
                class="price-input" 
                id="price-max" 
                placeholder="Max"
                min="0"
                value="1000000"
            >
        </div>
        
        <div class="price-slider">
            <input 
                type="range" 
                id="price-range-min" 
                min="0" 
                max="1000000" 
                step="1000"
                value="0"
            >
            <input 
                type="range" 
                id="price-range-max" 
                min="0" 
                max="1000000" 
                step="1000"
                value="1000000"
            >
        </div>
        
        <div class="debug-info">
            <strong>Debug Info:</strong>
            <div id="debug-output"></div>
        </div>
    </div>
    
    <script>
        const priceMin = document.getElementById('price-min');
        const priceMax = document.getElementById('price-max');
        const priceRangeMin = document.getElementById('price-range-min');
        const priceRangeMax = document.getElementById('price-range-max');
        const debugOutput = document.getElementById('debug-output');
        
        function updatePriceSliderBackground() {
            const minVal = parseInt(priceRangeMin.value);
            const maxVal = parseInt(priceRangeMax.value);
            const sliderMax = parseInt(priceRangeMin.max);
            
            const minPercent = (minVal / sliderMax) * 100;
            const maxPercent = (maxVal / sliderMax) * 100;

            const priceSlider = document.querySelector('.price-slider');
            priceSlider.style.setProperty('--range-progress-min', minPercent + '%');
            priceSlider.style.setProperty('--range-progress-max', maxPercent + '%');
            
            console.log('Price slider updated:', { minVal, maxVal, minPercent, maxPercent });
            debugOutput.innerHTML = `
                Min Value: ${minVal} (${minPercent.toFixed(2)}%)<br>
                Max Value: ${maxVal} (${maxPercent.toFixed(2)}%)<br>
                CSS Vars: --range-progress-min=${minPercent.toFixed(2)}%, --range-progress-max=${maxPercent.toFixed(2)}%
            `;
        }
        
        priceMin.addEventListener('input', () => {
            priceRangeMin.value = priceMin.value;
            updatePriceSliderBackground();
        });
        
        priceMax.addEventListener('input', () => {
            priceRangeMax.value = priceMax.value;
            updatePriceSliderBackground();
        });
        
        priceRangeMin.addEventListener('input', () => {
            priceMin.value = priceRangeMin.value;
            updatePriceSliderBackground();
        });
        
        priceRangeMax.addEventListener('input', () => {
            priceMax.value = priceRangeMax.value;
            updatePriceSliderBackground();
        });
        
        updatePriceSliderBackground();
    </script>
    <script src="assets/js/footer.js" defer></script>
</body>
</html>
