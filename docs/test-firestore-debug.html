<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Test Firestore Debug</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="assets/js/components/header.js"></script>
  <style>
    body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #fff; }
    .success { color: #4caf50; }
    .error { color: #f44336; }
    .info { color: #2196f3; }
    pre { background: #000; padding: 10px; border-radius: 5px; overflow-x: auto; }
  </style>
  <link rel="stylesheet" href="assets/css/aurum-light.css" />
</head>
<body>
  <div id="header-placeholder"></div>
  <h1>🔍 Diagnostic Firestore</h1>
  <div id="output"></div>

  <script>
    const output = document.getElementById('output');
    
    function log(msg, type = 'info') {
      const div = document.createElement('div');
      div.className = type;
      div.textContent = msg;
      output.appendChild(div);
      console.log(msg);
    }

    // Configuration Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBGmPM4OXEonp7qL78x20NC2DXvQW0lavU",
        authDomain: "aurum-bf.firebaseapp.com",
        projectId: "aurum-bf",
        storageBucket: "aurum-bf.firebasestorage.app",
        messagingSenderId: "858318726586",
        appId: "1:858318726586:web:14687fff6d4d08527a6983",
        measurementId: "G-SY7DY6WV97"
    };

    log('1️⃣ Initialisation Firebase...', 'info');
    
    try {
      firebase.initializeApp(firebaseConfig);
      log('✅ Firebase initialisé avec succès', 'success');
    } catch (error) {
      log('❌ Erreur initialisation Firebase: ' + error.message, 'error');
    }

    const db = firebase.firestore();
    log('2️⃣ Firestore récupéré', 'info');

    // Test 1: Lire les catégories
    log('\n📋 TEST 1: Lecture collection "categories"...', 'info');
    db.collection('categories').get()
      .then(snap => {
        log(`✅ Catégories: ${snap.size} documents trouvés`, 'success');
        snap.forEach(doc => {
          log(`  - ${doc.id}: ${JSON.stringify(doc.data())}`, 'info');
        });
      })
      .catch(err => {
        log(`❌ Erreur catégories: ${err.code} - ${err.message}`, 'error');
      });

    // Test 2: Lire les shops
    log('\n🏪 TEST 2: Lecture collection "shops"...', 'info');
    db.collection('shops').get()
      .then(snap => {
        log(`✅ Boutiques: ${snap.size} documents trouvés`, 'success');
        snap.forEach(doc => {
          log(`  - ${doc.id}: ${doc.data().name}`, 'info');
        });
        
        // Test 3: Pour chaque shop, lire les produits
        if (snap.size > 0) {
          log('\n📦 TEST 3: Lecture sous-collection "products" pour chaque shop...', 'info');
          snap.forEach(shopDoc => {
            shopDoc.ref.collection('products').get()
              .then(productsSnap => {
                log(`✅ Shop "${shopDoc.data().name}": ${productsSnap.size} produits`, 'success');
                productsSnap.forEach(prodDoc => {
                  log(`  - ${prodDoc.id}: ${prodDoc.data().name || 'Sans nom'}`, 'info');
                });
              })
              .catch(err => {
                log(`❌ Erreur produits shop ${shopDoc.id}: ${err.code} - ${err.message}`, 'error');
              });
          });
        }
      })
      .catch(err => {
        log(`❌ Erreur shops: ${err.code} - ${err.message}`, 'error');
      });

    // Test 4: Lire collection racine "products" (si elle existe)
    log('\n📦 TEST 4: Lecture collection racine "products"...', 'info');
    db.collection('products').get()
      .then(snap => {
        log(`✅ Products (racine): ${snap.size} documents trouvés`, 'success');
        snap.forEach(doc => {
          log(`  - ${doc.id}: ${doc.data().name || 'Sans nom'}`, 'info');
        });
      })
      .catch(err => {
        log(`❌ Erreur products racine: ${err.code} - ${err.message}`, 'error');
      });

    // Test 5: CollectionGroup (le plus important pour le catalogue)
    log('\n🌐 TEST 5: Lecture collectionGroup("products")...', 'info');
    db.collectionGroup('products').get()
      .then(snap => {
        log(`✅ CollectionGroup products: ${snap.size} documents trouvés`, 'success');
        snap.forEach(doc => {
          const shopId = doc.ref.parent.parent ? doc.ref.parent.parent.id : 'racine';
          log(`  - ${doc.id} (shop: ${shopId}): ${doc.data().name || 'Sans nom'}`, 'info');
        });
      })
      .catch(err => {
        log(`❌ ERREUR collectionGroup: ${err.code} - ${err.message}`, 'error');
        log(`   Message complet: ${err}`, 'error');
      });
  </script>
  <script src="assets/js/footer.js" defer></script>
</body>
</html>
