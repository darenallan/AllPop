<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>403 — Accès Refusé — Sanhia</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;700;900&family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Our scripts -->
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/global.utils.js"></script>
    <script src="/assets/js/global.js" defer></script>
    <script src="/assets/js/app.js" defer></script>

    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/global.css" />
    <link rel="stylesheet" href="/assets/css/pages/404.css" />
    <link rel="stylesheet" href="/assets/css/sanhia-light.css" />

    <style>
      /* Adaptations pour 403 */
      .num-real {
        color: #d97357;
      } /* Couleur rouge/orange pour interdit */
      .headline em {
        color: #d97357;
      }
      .btn-primary {
        background: #d97357;
      }
      .btn-primary::before {
        background: #f5a99d;
      } /* Hover color */
      .num-ghost {
        color: rgba(217, 115, 87, 0.04);
      }
    </style>
  </head>
  <body>
    <div id="cur-ring"></div>
    <div id="cur-dot"></div>
    <div id="noise"></div>
    <div id="header-placeholder"></div>

    <!-- STAGE -->
    <div class="stage">
      <!-- LEFT -->
      <div class="left">
        <div class="num-wrap">
          <span class="num-ghost">403</span>
          <span class="num-real">403</span>
        </div>

        <h1 class="headline">Accès <em>refusé</em><br />à cette zone</h1>

        <p class="subtext" id="error-msg">
          Seuls les vendeurs agréés peuvent accéder à l'espace vendeur.<br />
          Vous n'avez pas les permissions nécessaires.
        </p>

        <div class="cta-row">
          <a href="/" class="btn-aurum-primary" style="background: #d97357">
            <span>Retour à l'accueil</span>
          </a>
          <a href="/seller-application" class="btn-aurum-dark">
            Devenir vendeur
          </a>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="right">
        <div class="grid-lines"></div>

        <div class="ornament">
          <div class="orn-ring"></div>
          <div class="orn-ring"></div>
          <div class="orn-ring"></div>
          <div class="orn-center">
            <span class="orn-403" style="color: #d97357">403</span>
            <span class="orn-label">Accès interdit</span>
          </div>
        </div>

        <!-- Particules -->
        <div
          class="particle"
          style="left: 20%; bottom: 15%; --d: 7s; --delay: 0s; --dx: 30px"
        ></div>
        <div
          class="particle"
          style="left: 35%; bottom: 20%; --d: 9s; --delay: 1.5s; --dx: -20px"
        ></div>
        <div
          class="particle"
          style="left: 55%; bottom: 12%; --d: 6s; --delay: 0.8s; --dx: 15px"
        ></div>
        <div
          class="particle"
          style="left: 70%; bottom: 25%; --d: 8s; --delay: 2s; --dx: -25px"
        ></div>
        <div
          class="particle"
          style="left: 80%; bottom: 18%; --d: 7.5s; --delay: 0.3s; --dx: 10px"
        ></div>
        <div
          class="particle"
          style="left: 45%; bottom: 30%; --d: 10s; --delay: 3s; --dx: -15px"
        ></div>
        <div
          class="particle"
          style="left: 25%; bottom: 40%; --d: 8s; --delay: 1s; --dx: 20px"
        ></div>
        <div
          class="particle"
          style="left: 60%; bottom: 45%; --d: 6.5s; --delay: 2.5s; --dx: -30px"
        ></div>
      </div>
    </div>

    <!-- BOTTOM LINKS BAR -->
    <nav class="links-bar">
      <span class="links-bar-label">Aller vers</span>
      <a href="/" class="link-item">Accueil</a>
      <a href="/catalogue" class="link-item">Catalogue</a>
      <a href="/seller-application" class="link-item">Devenir vendeur</a>
      <a href="/login" class="link-item">Mon compte</a>
    </nav>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var reason = params.get("reason");
        var msgEl = document.getElementById("error-msg");
        var headline = document.querySelector(".headline");

        if (reason === "blocked") {
          msgEl.innerHTML =
            "Votre boutique a été suspendue ou bloquée.<br/>Veuillez contacter le support pour plus d'informations.";
          headline.innerHTML = "Boutique <em>suspendue</em>";
        } else if (reason === "error") {
          msgEl.innerHTML =
            "Une erreur s'est produite lors du chargement de vos données.<br/>Veuillez réessayer plus tard.";
          headline.innerHTML = "Erreur <em>système</em>";
        }
      })();
    </script>
  </body>
</html>
