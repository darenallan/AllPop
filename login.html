<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion - Sanhia</title>
  
  <!-- Polices "Aurum Awwwards" -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;700&display=swap" rel="stylesheet"/>
  
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <script src="assets/js/config.js"></script>
  <script src="assets/js/components/header.js"></script>
  <script src="assets/js/app.js" defer></script>


      <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/pages/login.css" />
  <link rel="stylesheet" href="assets/css/aurum-light.css" />
</head>
<body style="background:#0B0A08;margin:0;cursor:none">

<!-- Cursor & Noise -->
<div id="lg-ring"></div>
<div id="lg-dot"></div>
<div id="lg-noise"></div>
<div class="toast-container" id="toast-container"></div>

<!-- Header -->
<div id="header-placeholder"></div>

<!-- SCOPED MAIN -->
<main id="lg">
  <div class="lg-card">
    <div class="lg-icon">
      <i data-lucide="lock-keyhole" style="width: 32px; height: 32px;"></i>
    </div>
    <h1 class="lg-title">Connexion</h1>
    <p class="lg-subtitle">Accédez à votre espace privilégié Sanhia.</p>

    <form id="form-login" class="lg-form" aria-label="Formulaire de connexion">
      <div class="lg-input-group">
        <label class="lg-label">Adresse Email</label>
        <input type="email" id="login-email" class="lg-input" required placeholder="votre@email.com">
      </div>

      <div class="lg-input-group">
        <label class="lg-label">Mot de passe</label>
        <input type="password" id="login-pass" class="lg-input" required placeholder="••••••••">
      </div>

      <button type="submit" id="btn-submit" class="lg-btn">
        <span>Se connecter</span>
      </button>
    </form>

    <div class="lg-links">
      <a href="#" id="forgot-password-link" class="lg-link">Mot de passe oublié ?</a>
      <span style="color:var(--s); font-size:13px;">Pas encore de compte ? <a href="register.html" class="lg-link lg-link-gold">Créer un compte</a></span>
    </div>
  </div>
</main>

<!-- Scripts -->
<script src="assets/js/global.js" defer></script>
<script src="assets/js/pages/login.js" defer></script>
<script src="assets/js/footer.js" defer></script>
</body>
</html>
